<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfessorAI | AI Empires 😈</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        oswald: ['Oswald', 'sans-serif'], 
                        inter: ['Inter', 'sans-serif'] 
                    },
                    colors: {
                        cyber: { 
                            black: '#030303', cyan: '#00D0FF', dark: '#0a0a0a', border: '#1f2937', muted: '#94a3b8'
                        },
                        india: { 
                            saffron: '#FF9933', green: '#138808', navy: '#000080', light: '#f8fafc'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'spin-reverse': 'spin 15s linear infinite reverse',
                        'float': 'float 6s ease-in-out infinite',
                        'bounce-x': 'bounce-x 1s infinite'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'bounce-x': {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '50%': { transform: 'translateX(25%)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS for Interactivity & Gamification -->
    <style>
        :root {
            --multi-glow: linear-gradient(45deg, #FF9933, #138808, #000080, #FF9933);
            --bg-grid-color: rgba(0, 0, 128, 0.04);
            --cursor-color: #FF9933;
        }
        .dark {
            --multi-glow: linear-gradient(45deg, #00D0FF, #8b5cf6, #10b981, #f97316, #00D0FF);
            --bg-grid-color: rgba(255, 255, 255, 0.03);
            --cursor-color: #00D0FF;
        }

        /* --- Custom Gamified Cursor --- */
        body { 
            overflow-x: hidden; margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            cursor: none; /* Hide default cursor */
        }
        .cursor-dot, .cursor-outline {
            position: fixed; top: 0; left: 0; transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 9999; pointer-events: none;
        }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--cursor-color); transition: background-color 0.3s; }
        .cursor-outline { 
            width: 40px; height: 40px; border: 2px solid var(--cursor-color); 
            transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.3s; 
        }
        /* Hover state for cursor */
        body.hovering .cursor-outline { width: 60px; height: 60px; background-color: rgba(255, 153, 51, 0.1); border-color: transparent; }
        .dark body.hovering .cursor-outline { background-color: rgba(0, 208, 255, 0.1); }
        
        #webgl-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; transition: opacity 0.5s ease;}

        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, var(--bg-grid-color) 1px, transparent 1px), linear-gradient(to bottom, var(--bg-grid-color) 1px, transparent 1px);
            position: absolute; inset: 0; z-index: -1;
            mask-image: linear-gradient(to bottom, black 30%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 100%);
            transition: background-image 0.5s ease;
        }

        h1, h2, h3, .font-oswald { font-family: 'Oswald', sans-serif; }
        
        .headline-gradient {
            background: linear-gradient(90deg, #FF9933 0%, #000080 50%, #138808 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            animation: gradient-move 5s linear infinite;
        }
        .dark .headline-gradient {
            background: #00D0FF; -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-shadow: 0 0 30px rgba(0, 208, 255, 0.5); animation: none;
        }

        /* Multi-Color Pulse Glows */
        .active-glow { position: relative; z-index: 1; border-radius: inherit; display: inline-block; }
        .active-glow::before {
            content: ''; position: absolute; inset: -4px; z-index: -1; border-radius: inherit;
            background: var(--multi-glow); background-size: 300% 300%; opacity: 0.8;
            animation: glow-pulse 2s ease-in-out infinite alternate, gradient-move 4s linear infinite;
        }
        
        .hover-glow { position: relative; z-index: 1; height: 100%;}
        .hover-glow::after {
            content: ''; position: absolute; inset: -4px; z-index: -2; border-radius: 20px; 
            background: var(--multi-glow); background-size: 300% 300%;
            filter: blur(12px); opacity: 0; transition: opacity 0.4s ease; animation: gradient-move 4s linear infinite;
        }
        .hover-glow:hover::after { opacity: 0.8; }

        @keyframes gradient-move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes glow-pulse { 0% { transform: scale(0.96); filter: blur(8px); opacity: 0.6; } 100% { transform: scale(1.04); filter: blur(16px); opacity: 1; } }

        /* Bento Cards */
        .bento-card {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 128, 0.1); border-radius: 16px; padding: 2rem;
            transition: border-color 0.4s ease; position: relative; overflow: hidden; height: 100%; display: flex; flex-direction: column; z-index: 1;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 128, 0.05);
            /* Vanilla Tilt will handle the transform */
        }
        .dark .bento-card { background: rgba(8, 8, 8, 0.85); border-color: #1f2937; box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        .bento-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(255, 153, 51, 0.15), transparent 50%);
            opacity: 0; transition: opacity 0.3s ease; z-index: -1; pointer-events: none;
        }
        .dark .bento-card::before { background: radial-gradient(circle at 50% -20%, rgba(0, 208, 255, 0.1), transparent 50%); }
        .bento-card:hover { border-color: rgba(255, 153, 51, 0.5); }
        .dark .bento-card:hover { border-color: rgba(0, 208, 255, 0.5); }
        .bento-card:hover::before { opacity: 1; }

        /* Animated Module Backgrounds */
        .module-bg { position: absolute; inset: 0; z-index: 0; opacity: 0.1; transition: opacity 0.4s; pointer-events: none; overflow: hidden; mix-blend-mode: multiply;}
        .dark .module-bg { opacity: 0.15; mix-blend-mode: screen;}
        .bento-card:hover .module-bg { opacity: 0.3; }
        .dark .bento-card:hover .module-bg { opacity: 0.4; }

        .anim-grid { background-image: linear-gradient(to right, currentcolor 1px, transparent 1px), linear-gradient(to bottom, currentcolor 1px, transparent 1px); background-size: 20px 20px; animation: bg-scroll 3s linear infinite; }
        .anim-mandala::before, .anim-mandala::after { content: ''; position: absolute; inset: -20%; border: 2px dashed currentcolor; border-radius: 50%; animation: spin-slow 10s linear infinite; opacity: 0.5; }
        .anim-nodes { background-image: radial-gradient(currentcolor 2px, transparent 2px); background-size: 30px 30px; animation: bg-pulse 3s ease-in-out infinite; }
        .anim-laser::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: currentcolor; box-shadow: 0 0 10px currentcolor; animation: scan 2.5s ease-in-out infinite; }
        .anim-chain { border-top: 4px dashed currentcolor; border-bottom: 4px dashed currentcolor; position: absolute; top: 40%; height: 20%; width: 200%; animation: slide-left 4s linear infinite; }
        .anim-warp { background: repeating-linear-gradient(90deg, transparent, transparent 10%, currentcolor 10%, currentcolor 11%); background-size: 200% 100%; animation: slide-left 0.5s linear infinite; }
        .anim-eq { display: flex; align-items: flex-end; justify-content: space-evenly; padding: 10px; }
        .anim-eq div { width: 15%; background: currentcolor; animation: eq-bounce 1s ease-in-out infinite alternate; border-radius: 2px 2px 0 0;}
        .anim-eq div:nth-child(2) { animation-delay: 0.2s; } .anim-eq div:nth-child


    <!-- GSAP Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.registerPlugin(ScrollTrigger);

            // Hero Animations
            gsap.to("#nav-reveal", { opacity: 1, duration: 1, delay: 0.5 });
            gsap.from(".gsap-hero > *", {
                y: 30, opacity: 0, duration: 1, stagger: 0.15, ease: "power3.out"
            });

            // Section Headers
            gsap.utils.toArray(".gsap-section").forEach(section => {
                gsap.from(section, {
                    scrollTrigger: { trigger: section, start: "top 80%" },
                    y: 50, opacity: 0, duration: 0.8, ease: "power2.out"
                });
            });

            // WoT Grid Cards (Staggered)
            gsap.from(".gsap-card", {
                scrollTrigger: { trigger: ".gsap-card", start: "top 85%" },
                y: 50, opacity: 0, duration: 0.6, stagger: 0.1, ease: "power2.out"
            });

            // Flagship Left/Right Reveals
            gsap.utils.toArray(".gsap-reveal-left").forEach(item => {
                gsap.from(item, {
                    scrollTrigger: { trigger: item, start: "top 80%" },
                    x: -50, opacity: 0, duration: 0.8, ease: "power3.out"
                });
            });
            gsap.utils.toArray(".gsap-reveal-right").forEach(item => {
                gsap.from(item, {
                    scrollTrigger: { trigger: item, start: "top 80%" },
                    x: 50, opacity: 0, duration: 0.8, ease: "power3.out"
                });
            });

            // Footer
            gsap.from(".gsap-footer > *", {
                scrollTrigger: { trigger: ".gsap-footer", start: "top 90%" },
                y: 30, opacity: 0, duration: 0.8, stagger: 0.1, ease: "power2.out"
            });
        });
    </script>
</body>
</html>
